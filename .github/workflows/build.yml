name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 수동 실행 버튼도 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 체크아웃
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. gradlew 실행 권한
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. local.properties 자동 생성 (SDK 경로는 Actions 환경 기본값 사용)
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # 5. Debug APK 빌드
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. APK를 Artifacts로 업로드 (Actions 탭에서 다운로드 가능)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4DMinesweeper-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. Release 태그 자동 생성 및 APK 첨부
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "4D Minesweeper Build #${{ github.run_number }}"
          body: |
            자동 빌드된 디버그 APK입니다.
            아래 Assets에서 `app-debug.apk`를 다운로드하세요.
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
